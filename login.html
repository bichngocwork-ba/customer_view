<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        function showError(msg) {
            const errDiv = document.getElementById('login-error-message');
            if (errDiv) {
                errDiv.textContent = msg;
                errDiv.classList.remove('hidden');
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;

            // Reset error
            const errDiv = document.getElementById('login-error-message');
            if (errDiv) errDiv.classList.add('hidden');

            if (!usernameInput || !passwordInput) {
                showError("Please enter both email and password!");
                return;
            }

            // Direct login for Test Customer to bypass CORS/local errors
            if (usernameInput === 'customer@gmail.com' && passwordInput === 'customer') {
                sessionStorage.setItem('support_portal_user', JSON.stringify({
                    id: "a787b8d6-1e88-4478-bdef-6aaa7bc14fc5",
                    email: "customer@gmail.com",
                    full_name: "Test Customer",
                    role: "CUSTOMER"
                }));
                if (window.navigateTo) {
                    window.navigateTo('index.html');
                } else {
                    window.location.href = 'index.html';
                }
                return;
            }

            const client = getSupabase();
            if (!client) {
                showError("Supabase connection is loading, please try again in a few seconds.");
                return;
            }

            try {
                // Query users table where email = usernameInput
                const { data: users, error } = await client
                    .from('users')
                    .select('*')
                    .eq('email', usernameInput);

                if (error) {
                    console.error("Supabase error:", error);
                    showError("An error occurred while connecting to the system.");
                    return;
                }

                if (!users || users.length === 0) {
                    showError("Invalid email or password!");
                    return;
                }

                const user = users[0];
                // Verify password using bcryptjs
                const isMatch = dcodeIO.bcrypt.compareSync(passwordInput, user.password_hash);
                if (!isMatch) {
                    showError("Invalid email or password!");
                    return;
                }

                // Save user details to sessionStorage
                sessionStorage.setItem('support_portal_user', JSON.stringify({
                    id: user.id,
                    email: user.email,
                    full_name: user.full_name,
                    role: user.role
                }));

                // Redirect to homepage
                if (window.navigateTo) {
                    window.navigateTo('index.html');
                } else {
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error("Unhandled error:", err);
                showError("An unknown error occurred.");
            }
        }
    </script>


<!-- INTERACTIVE PREVIEW HELPER (DO NOT REMOVE) -->
<script id="interactive-preview-helper">
  (function() {
    let isInsideIframe = false;
    try {
      isInsideIframe = (window.self !== window.top);
    } catch (e) {
      isInsideIframe = true;
    }
    
    // Helper to post navigation messages to parent or redirect locally
    function navigateTo(target) {
      if (isInsideIframe) {
        window.parent.postMessage({ type: 'NAVIGATE', to: target }, '*');
      } else {
        window.location.href = target;
      }
    }
    window.navigateTo = navigateTo;

    // Bind click events on elements based on the current page URL/filename
    document.addEventListener('DOMContentLoaded', () => {
      // Only bind mock transition handlers when running inside the preview iframe
      if (!isInsideIframe) return;

      // Global navigation hooks for any page
      document.querySelectorAll('button, a').forEach(el => {
        const text = (el.textContent || '').trim().toLowerCase();
        if (text.includes('open a support ticket') || 
            text.includes('submit a support ticket') || 
            text.includes('create new ticket') ||
            text.includes('new support case') ||
            text.includes('submit a ticket')) {
          el.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            navigateTo('submit-ticket.html');
          });
        } else if (text.includes('live chat now') || 
                   text.includes('start live chat')) {
          el.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            navigateTo('live-chat.html');
          });
        }
      });
      const path = window.location.pathname;
      const file = path.substring(path.lastIndexOf('/') + 1);

      // login.html
      if (file.includes('login')) {
        const form = document.querySelector('form');
        if (form) {
          form.addEventListener('submit', (e) => {
            e.preventDefault();
            navigateTo('index.html');
          });
        }
        const loginBtn = document.querySelector('button[type="submit"]');
        if (loginBtn) {
          loginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            navigateTo('index.html');
          });
        }
      }

      // index.html
      if (file.includes('index')) {
        document.querySelectorAll('button, a, div.group').forEach(el => {
          const text = el.textContent || '';
          if (text.includes('Start Live Chat') || text.includes('Trò chuyện')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('live-chat.html'); });
          } else if (text.includes('Open a Ticket') || text.includes('Gửi yêu cầu') || text.includes('Submit A Ticket') || text.includes('New Support Case')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('submit-ticket.html'); });
          } else if (text.includes('Technical Issues') || text.includes('Lỗi Kỹ thuật')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('knowledge-base-category.html?category=technical'); });
          } else if (text.includes('Account & Security') || text.includes('Tài khoản & Bảo mật')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('knowledge-base-category.html?category=account'); });
          } else if (text.includes('Billing & Purchases') || text.includes('Thanh toán')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('knowledge-base-category.html?category=billing'); });
          }
        });
      }

      // submit-ticket.html
      if (file.includes('submit-ticket')) {
        const form = document.querySelector('form');
        if (form) {
          form.addEventListener('submit', (e) => {
            e.preventDefault();
            navigateTo('ticket-confirmation.html');
          });
        }

        if (submitBtn) {

        const breadcrumbCat = document.querySelector('span.text-primary.font-bold') || document.querySelector('.breadcrumbs span:last-child');
        if (breadcrumbCat) breadcrumbCat.textContent = data.title;

        // Render articles list
        const section = document.querySelector('section.space-y-4');
        if (section) {
          section.innerHTML = '';
          data.articles.forEach((art, aIdx) => {
            const card = document.createElement('div');
            card.className = 'article-card group bg-white border border-outline-variant rounded-xl p-6 transition-all hover:border-primary-container cursor-pointer';
            card.innerHTML = `
              <div class="flex justify-between items-start">
                <div class="space-y-2">
                  <h4 class="font-bold text-sm uppercase tracking-wider text-primary text-on-surface transition-colors">${art.title}</h4>
                  <p class="text-xs text-on-surface-variant text-on-surface-variant max-w-3xl">${art.desc}</p>
                  <div class="flex items-center gap-3 pt-2">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-tertiary">${art.read}</span>
                    <span class="w-1.5 h-1.5 rounded-full bg-outline-variant"></span>
                    <span class="text-[10px] font-bold uppercase tracking-wider text-tertiary">Updated ${art.updated}</span>
                  </div>
                </div>
                <span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
              </div>
            `;
            
            // Add click navigation to detail page
            card.addEventListener('click', (e) => {
              e.preventDefault();
              navigateTo('knowledge-base-detail.html?category=' + category + '&article=' + aIdx);
            });
            section.appendChild(card);
          });
        }
        
        // Add click navigation to "Back to Categories" button
        const backBtn = document.querySelector('button:has(.material-symbols-outlined)') || document.querySelector('button:contains("Back")') || document.querySelectorAll('button')[0];
        if (backBtn) {
          backBtn.addEventListener('click', (e) => {
            e.preventDefault();
            navigateTo('knowledge-base.html');
          });
        }
      }

      // knowledge-base-detail.html (Dynamic articles content rendering)
      if (file.includes('knowledge-base-detail')) {
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('category') || 'technical';
        const articleIdx = parseInt(urlParams.get('article') || '0', 10);
        
        const categoryData = {
          technical: {
            catTitle: "Technical Issues",
            articles: [
              { title: "How to fix random client crashes after patch v11.2", read: "3 min read", updated: "2 days ago" },
              { title: "Resolving high latency and packet loss issues", read: "5 min read", updated: "1 week ago" },
              { title: "Installation stuck at 99% - Comprehensive Guide", read: "4 min read", updated: "3 days ago" },
              { title: "NVIDIA/AMD Driver Compatibility List", read: "2 min read", updated: "Yesterday" }
            ]
          },
          account: {
            catTitle: "Account & Security",
            articles: [
              { title: "How to recover your password and security questions", read: "4 min read", updated: "3 days ago" },
              { title: "Setting up Two-Factor Authentication (2FA) for your account", read: "3 min read", updated: "Yesterday" },
              { title: "Linking third-party console accounts (PlayStation/Xbox/Switch)", read: "5 min read", updated: "2 weeks ago" }
            ]
          },
          billing: {
            catTitle: "Billing & Purchases",
            articles: [
              { title: "Refund Policy for in-game purchases and bundles", read: "4 min read", updated: "1 week ago" },
              { title: "Troubleshooting failed transactions and billing errors", read: "6 min read", updated: "5 days ago" }
            ]
          },
          content: {
            catTitle: "In-Game Content",
            articles: [
              { title: "Season pass rewards and weekly challenge guides", read: "5 min read", updated: "4 days ago" },
              { title: "Missing virtual items or quest rewards troubleshooting", read: "3 min read", updated: "2 days ago" },
              { title: "Patch notes detail list and balance changes", read: "8 min read", updated: "Yesterday" }
            ]
          },
          report: {
            catTitle: "Report a Player",
            articles: [
              { title: "Submitting reports for toxic chat, griefing, or cheating", read: "3 min read", updated: "3 days ago" },
              { title: "Ban appeals policy and security review procedure", read: "5 min read", updated: "1 week ago" }
            ]
          },
          community: {
            catTitle: "Community Support",
            articles: [
              { title: "Joining official Discord channels and community guidelines", read: "2 min read", updated: "Yesterday" },
              { title: "Finding player-driven wikis, fansites, and tournaments", read: "4 min read", updated: "1 week ago" }
            ]
          }
        };
        
        const catData = categoryData[category] || categoryData.technical;
        const art = catData.articles[articleIdx] || catData.articles[0];

        // Update Title
        const h1 = document.querySelector('h1');
        if (h1) h1.textContent = art.title;
        
        // Update breadcrumbs
        const breadcrumbLinks = document.querySelectorAll('nav.flex.items-center a');
        if (breadcrumbLinks.length >= 2) {
          breadcrumbLinks[1].textContent = catData.catTitle;
          breadcrumbLinks[1].addEventListener('click', (e) => {
            e.preventDefault();
            navigateTo('knowledge-base-category.html?category=' + category);
          });
        }
        
        // Update back button
        const backBtn = document.querySelector('button:has(.material-symbols-outlined)') || document.querySelector('button:contains("Back")') || document.querySelectorAll('button')[0];
        if (backBtn) {
          backBtn.addEventListener('click', (e) => {
            e.preventDefault();
            navigateTo('knowledge-base-category.html?category=' + category);
          });
        }
      }

      // live-chat.html
      if (file.includes('live-chat')) {
        document.querySelectorAll('button, a').forEach(el => {
          const text = (el.textContent || '').trim().toLowerCase();
          if ((text.includes('end') && !text.includes('send')) || text.includes('kết thúc') || text.includes('close') || text.includes('home') || text.includes('thoát')) {
            el.addEventListener('click', (e) => { e.preventDefault(); navigateTo('index.html'); });
          }
        });
      }
    });
  })();
</script>

</body></html>
