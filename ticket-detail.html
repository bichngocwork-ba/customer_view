<script>
document.addEventListener('DOMContentLoaded', async () => {
  // Auth check
  const user = getCurrentUser();
  if (!user) { navigateTo('login.html'); return; }

  // Update header
  const headerUsername = document.getElementById('header-username');
  if (headerUsername) headerUsername.textContent = user.full_name || user.username || user.email || 'User';

  // Parse ticket ID from URL
  const urlParams = new URLSearchParams(window.location.search);
  const ticketId = urlParams.get('id');
  if (!ticketId) { navigateTo('tickets.html'); return; }

  await new Promise(resolve => setTimeout(resolve, 300)); // wait for supabase lib
  const db = getSupabase();

  // Helper: status badge
  function statusBadge(status) {
    const s = (status || '').toLowerCase();
    if (s === 'open') return { cls: 'bg-green-100 text-green-700 border-green-200', label: 'Open' };
    if (s === 'in progress') return { cls: 'bg-amber-100 text-amber-800 border-amber-200', label: 'In Progress' };
    if (s === 'resolved') return { cls: 'bg-slate-100 text-slate-700 border-slate-200', label: 'Resolved' };
    return { cls: 'bg-slate-100 text-slate-700 border-slate-200', label: status };
  }

  // Load ticket detail
  try {
    const { data: ticket, error } = await db
      .from('tickets')
      .select(`
        id, status, created_at, description,
        game_id, category_id,
        games(game_name),
        ticket_categories(category_name)
      `)
      .eq('id', ticketId)
      .single();

    if (error || !ticket) throw error || new Error('Ticket not found');

    // Populate header fields
    document.getElementById('ticket-id-title').textContent = 'Ticket #' + ticket.id;
    const badge = statusBadge(ticket.status || 'open');
    const statusTag = document.getElementById('ticket-status-tag');
    statusTag.textContent = badge.label;
    statusTag.className = `${badge.cls} px-2.5 py-0.5 rounded text-[10px] font-bold uppercase border`;
    statusTag.classList.remove('hidden');

    const dateStr = ticket.created_at ? new Date(ticket.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '—';
    document.getElementById('ticket-date-submitted').textContent = 'Submitted on ' + dateStr;
    document.getElementById('ticket-product').textContent = ticket.games?.game_name || ticket.game_id || '—';
    document.getElementById('ticket-category').textContent = ticket.ticket_categories?.category_name || ticket.category_id || '—';

    // Banner logic based on status
    const bannerText = document.getElementById('ticket-banner-text');
    const bannerExpected = document.getElementById('ticket-banner-expected');
    const bannerContainer = document.getElementById('ticket-banner-container');
    if (ticket.status === 'resolved') {
      bannerText.textContent = 'This ticket has been resolved. Thank you for contacting support.';
      bannerExpected.textContent = 'Closed';
      bannerContainer.className = 'bg-green-50 px-md py-4 border border-green-200 rounded-xl flex items-center justify-between mb-lg shadow-sm text-green-800';
      bannerContainer.querySelector('.material-symbols-outlined').className = 'material-symbols-outlined text-xl text-green-600';
    } else {
      bannerText.textContent = 'An agent is currently reviewing your technical log files.';
      bannerExpected.textContent = 'Expected update in: 4 hours';
      bannerContainer.className = 'bg-[#eef2ff] px-md py-4 border border-[#cbd5e1] rounded-xl flex items-center justify-between mb-lg shadow-sm';
      bannerContainer.querySelector('.material-symbols-outlined').className = 'material-symbols-outlined text-xl text-[#2563eb]';
    }

    // Parse description for category answers
    let rawDescription = ticket.description || '';
    let parsedUserDescription = rawDescription;
    let additionalInfoHtml = '';

    const markerEnglish = "-- Category Details --";
    const markerVietnamese = "-- Chi tiết danh mục --";
    let marker = null;
    if (rawDescription.includes(markerEnglish)) {
      marker = markerEnglish;
    } else if (rawDescription.includes(markerVietnamese)) {
      marker = markerVietnamese;
    }

    if (marker) {
      const parts = rawDescription.split(marker);
      parsedUserDescription = parts[0].trim();
      const details = parts[1].trim().split('\n');

      details.forEach(line => {
        const colonIndex = line.indexOf(':');
        if (colonIndex !== -1) {
          const label = line.substring(0, colonIndex).trim();
          const value = line.substring(colonIndex + 1).trim();
          
          if (value) {
            additionalInfoHtml += `
              <div class="p-md bg-white rounded-xl border border-outline-variant/40 shadow-sm flex flex-col justify-center min-h-[72px]">
                <p class="text-label-sm text-on-surface-variant mb-xs font-medium text-[10px] text-slate-500 uppercase tracking-wider">${label}</p>
                <p class="text-xs font-bold text-slate-900">${value}</p>
              </div>
            `;
          }
        }
      });
    }

    // Render parsed Q&A
    const qaGrid = document.getElementById('ticket-qa-grid');
    if (additionalInfoHtml) {
      qaGrid.innerHTML = additionalInfoHtml;
    } else {
      qaGrid.innerHTML = '<div class="col-span-2 text-xs text-on-surface-variant italic">No additional details recorded.</div>';
    }

    // Render User Description
    document.getElementById('ticket-user-description').innerHTML = parsedUserDescription ? `"${parsedUserDescription}"` : '(No description provided)';

  } catch(err) {
    console.error('Error loading ticket:', err);
    document.getElementById('ticket-id-title').textContent = 'Ticket #' + ticketId;
    document.getElementById('ticket-user-description').textContent = 'Could not load ticket details. Please try again.';
  }
});
</script>

<!-- INTERACTIVE PREVIEW HELPER (DO NOT REMOVE) -->
<script id="interactive-preview-helper">
  (function() {
    let isInsideIframe = false;
    try {
      isInsideIframe = (window.self !== window.top);
    } catch (e) {
      isInsideIframe = true;
    }
    
    window.navigateTo = function(target) {
      if (isInsideIframe) {
        window.parent.postMessage({ type: 'NAVIGATE', to: target }, '*');
      } else {
        window.location.href = target;
      }
    };
    
    /* Run in both iframe and standalone modes */

    // Bind click events on elements based on the current page URL/filename
    document.addEventListener('DOMContentLoaded', () => {
      const path = window.location.pathname;
      const file = path.substring(path.lastIndexOf('/') + 1);

      // login.html
      if (file.includes('login')) {
        const form = document.querySelector('form');
        if (form) {
          form.addEventListener('submit', (e) => {
            e.preventDefault();
            navigateTo('index.html');
          });
        }
        const loginBtn = document.querySelector('button[type="submit"]');
        if (loginBtn) {
          loginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            navigateTo('index.html');
          });
        }
      }

      // index.html
      if (file.includes('index')) {
        document.querySelectorAll('button, a, div.group').forEach(el => {
          const text = el.textContent || '';
          if (text.includes('Start Live Chat') || text.includes('Trò chuyện')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('live-chat.html'); });
          } else if (text.includes('Open a Ticket') || text.includes('Gửi yêu cầu') || text.includes('Submit A Ticket') || text.includes('New Support Case')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('submit-ticket.html'); });
          } else if (text.includes('Technical Issues') || text.includes('Lỗi Kỹ thuật')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('knowledge-base-category.html?category=technical'); });
          } else if (text.includes('Account & Security') || text.includes('Tài khoản & Bảo mật')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('knowledge-base-category.html?category=account'); });
          } else if (text.includes('Billing & Purchases') || text.includes('Thanh toán')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('knowledge-base-category.html?category=billing'); });
          }
        });
      }

      // submit-ticket.html
      if (file.includes('submit-ticket')) {
        const form = document.querySelector('form');
        if (form) {
          form.addEventListener('submit', (e) => {
            e.preventDefault();
            navigateTo('ticket-confirmation.html');
          });
        }
        const submitBtn = document.querySelector('button[type="submit"]');
        if (submitBtn) {
          submitBtn.addEventListener('click', (e) => {
            e.preventDefault();
            navigateTo('ticket-confirmation.html');
          });
        }
      }

      // ticket-confirmation.html
      if (file.includes('ticket-confirmation')) {
        document.querySelectorAll('button, a').forEach(el => {
          const text = el.textContent || '';
          if (text.toLowerCase().includes('view') || text.toLowerCase().includes('xem') || text.toLowerCase().includes('ticket')) {
            el.addEventListener('click', (e) => { e.preventDefault(); navigateTo('ticket-detail.html'); });
          } else if (text.toLowerCase().includes('home') || text.toLowerCase().includes('chủ') || text.toLowerCase().includes('quay lại')) {
            el.addEventListener('click', (e) => { e.preventDefault(); navigateTo('index.html'); });
          }
        });
      }

      // tickets.html
      if (file.includes('tickets')) {
        document.querySelectorAll('tr, li, div.cursor-pointer, .border-outline-variant').forEach(el => {
          if (el.textContent.includes('TK-') || el.textContent.includes('Ticket') || el.textContent.includes('Yêu cầu')) {
            el.addEventListener('click', (e) => {
              e.preventDefault();
              navigateTo('ticket-detail.html');
            });
          }
        });
      }

      // ticket-detail.html
      if (file.includes('ticket-detail')) {
        document.querySelectorAll('a, button').forEach(el => {
          const text = el.textContent || '';
          if (text.toLowerCase().includes('back') || text.toLowerCase().includes('quay lại') || text.toLowerCase().includes('danh sách')) {
            el.addEventListener('click', (e) => { e.preventDefault(); navigateTo('tickets.html'); });
          }
        });
      }

      // knowledge-base.html
      if (file.includes('knowledge-base')) {
        // Setup View all 12 categories button interaction
        const viewAllBtn = document.getElementById('view-all-categories-btn');
        const grid = document.getElementById('categories-grid');
        if (viewAllBtn && grid) {
          viewAllBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            // Check if cards already added
            if (document.getElementById('added-card-7')) {
              // Toggle off
              for (let i = 7; i <= 12; i++) {
                const card = document.getElementById('added-card-' + i);
                if (card) card.remove();
              }
              viewAllBtn.innerHTML = 'View all 12 categories <span class="material-symbols-outlined text-sm">arrow_forward</span>';
              return;
            }
            
            // Append 6 new categories
            const extraCategories = [
              { id: 7, title: "Game Downloads & Updates", icon: "download", count: 2, bg: "#E0F7FA", desc: "Troubleshoot patcher loops, file verification, launcher freezes, and download speed optimization." },
              { id: 8, title: "Esports & Tournaments", icon: "emoji_events", count: 2, bg: "#FFF9C4", desc: "Get schedules, team statistics, reward drops, ticket bookings, and tournament rules." },
              { id: 9, title: "Merchandise Support", icon: "shopping_bag", count: 2, bg: "#F5F5F5", desc: "Inquire about clothing apparel sizes, order shipping status, tracking numbers, and damage refunds." },
              { id: 10, title: "Creator Partner Program", icon: "video_camera_front", count: 2, bg: "#E1BEE7", desc: "How to join our creator network, access early updates, custom overlays, and monetization benefits." },
              { id: 11, title: "Localization & Language", icon: "translate", count: 2, bg: "#DCEDC8", desc: "Change in-game audio dubbing, client text translation, regional settings, and server transfers." },
              { id: 12, title: "Feedback & Suggestions", icon: "rate_review", count: 2, bg: "#FFE0B2", desc: "Submit game ideas directly to designers, vote on feature requests, and report in-game bugs." }
            ];
            
            extraCategories.forEach(cat => {
              const card = document.createElement('div');
              card.id = 'added-card-' + cat.id;
              card.className = 'category-card bg-white border border-[#E0E0E0] rounded-[12px] p-8 transition-all duration-300 flex flex-col group cursor-pointer';
              card.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                  <div class="w-14 h-14 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform duration-300" style="background-color: ${cat.bg};">
                    <span class="material-symbols-outlined text-primary text-3xl">${cat.icon}</span>
                  </div>
                  <span class="text-[10px] font-bold uppercase tracking-wider text-tertiary-container bg-surface-container-low px-2 py-1 rounded">${cat.count} Articles</span>
                </div>
                <h3 class="font-bold text-sm uppercase tracking-wider text-primary text-on-surface mb-3 group-hover:text-primary transition-colors">${cat.title}</h3>
                <p class="text-xs text-on-surface-variant text-on-surface-variant flex-1">${cat.desc}</p>
