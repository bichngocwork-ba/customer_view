<script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = getCurrentUser();
            if (user) {
                const nameEl = document.getElementById('user-display-name');
                if (nameEl) nameEl.textContent = user.full_name;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const categoryParam = urlParams.get('category') || 'Technical Issues';

            // Mapping short URL param to DB category name
            const categoryMapping = {
                'technical': 'Technical Issues',
                'connection': 'Connection & Network',
                'account': 'Account & Security',
                'billing': 'Billing & Purchases',
                'bug': 'Bug Report',
                'report': 'Report a Player',
                'content': 'In-Game Content',
                'community': 'Community Support',
                'esports': 'Esports & Tournaments',
                'merch': 'Merchandise Support',
                'creator': 'Creator Partner Program',
                'language': 'Localization & Language'
            };

            const categoryName = categoryMapping[categoryParam] || categoryParam;

            // Define UI metadata mapping for category name
            const categoryMetadata = {
                "Technical Issues": { icon: "settings", bg: "#E0F2F1" },
                "Connection & Network": { icon: "wifi", bg: "#E8F0FE" },
                "Account & Security": { icon: "security", bg: "#dbe1ff" },
                "Billing & Purchases": { icon: "payments", bg: "#dbe1ff" },
                "Bug Report": { icon: "bug_report", bg: "#FCE8E6", textClass: "text-error" },
                "Report a Player": { icon: "flag", bg: "#FFDAD6", textClass: "text-error" },
                "In-Game Content": { icon: "sports_esports", bg: "#EADDF6" },
                "Community Support": { icon: "forum", bg: "#d8e2ff" },
                "Esports & Tournaments": { icon: "emoji_events", bg: "#FFF9C4" },
                "Merchandise Support": { icon: "shopping_bag", bg: "#F5F5F5" },
                "Creator Partner Program": { icon: "video_camera_front", bg: "#E1BEE7" },
                "Localization & Language": { icon: "translate", bg: "#DCEDC8" }
            };

            const meta = categoryMetadata[categoryName] || { icon: "settings", bg: "#E0F2F1" };

            // Update title
            const titleEl = document.querySelector('h1');
            if (titleEl) titleEl.textContent = categoryName;
            
            const descEl = titleEl?.nextElementSibling;
            if (descEl) descEl.textContent = `Các bài viết hướng dẫn liên quan đến ${categoryName}.`;

            // Update icon and container background
            const iconSpan = document.querySelector('section.mb-12 span.material-symbols-outlined');
            const iconContainer = document.querySelector('section.mb-12 .w-16.h-16');
            if (iconSpan) {
                iconSpan.textContent = meta.icon;
                if (meta.textClass) {
                    iconSpan.className = `material-symbols-outlined text-[40px] ${meta.textClass}`;
                } else {
                    iconSpan.className = `material-symbols-outlined text-[40px] text-primary`;
                }
            }
            if (iconContainer) iconContainer.style.backgroundColor = meta.bg;

            // Update back link action
            const backBtn = document.querySelector('button:has(.material-symbols-outlined)');
            if (backBtn) {
                backBtn.onclick = (e) => {
                    e.preventDefault();
                    if (window.navigateTo) {
                        window.navigateTo('faqs.html');
                    } else {
                        window.location.href = 'faqs.html';
                    }
                };
            }

            // Bind Support CTA buttons
            const ctaButtons = document.querySelectorAll('section.mt-16 button');
            if (ctaButtons.length >= 2) {
                ctaButtons[0].addEventListener('click', (e) => {
                    e.preventDefault();
                    if (window.navigateTo) {
                        window.navigateTo('submit-ticket.html');
                    } else {
                        window.location.href = 'submit-ticket.html';
                    }
                });

                ctaButtons[1].addEventListener('click', (e) => {
                    e.preventDefault();
                    if (window.navigateTo) {
                        window.navigateTo('live-chat.html');
                    } else {
                        window.location.href = 'live-chat.html';
                    }
                });
            }

            // Retrieve articles from Supabase
            const client = getSupabase();
            const section = document.querySelector('section.space-y-4');
            if (!client || !section) return;

            section.innerHTML = '<div class="text-center py-8 text-on-surface-variant">Đang tải dữ liệu...</div>';

            try {
                const { data: articles, error } = await client
                    .from('knowledge_base_articles')
                    .select('*')
                    .eq('category', categoryName);

                if (error) {
                    console.error("Error fetching articles:", error);
                    section.innerHTML = '<div class="text-center py-8 text-error">Lỗi khi tải bài viết.</div>';
                    return;
                }

                section.innerHTML = '';
                if (articles && articles.length > 0) {
                    articles.forEach(art => {
                        const card = document.createElement('div');
                        card.className = 'article-card group bg-white border border-outline-variant rounded-xl p-6 transition-all hover:border-primary-container cursor-pointer';
                        card.innerHTML = `
                          <div class="flex justify-between items-start">
                            <div class="space-y-2 flex-1 pr-md">
                              <h4 class="font-bold text-sm uppercase tracking-wider text-primary text-on-surface transition-colors">${art.title}</h4>
                              <p class="text-xs text-on-surface-variant max-w-3xl">${art.content ? art.content.substring(0, 180) + '...' : ''}</p>
                              <div class="flex items-center gap-3 pt-2">
                                <span class="text-[10px] font-bold uppercase tracking-wider text-tertiary">${art.view_count || 0} views</span>
                                <span class="w-1.5 h-1.5 rounded-full bg-outline-variant"></span>
                                <span class="text-[10px] font-bold uppercase tracking-wider text-tertiary">Updated: ${new Date(art.updated_at).toLocaleDateString('en-US')}</span>
                              </div>
                            </div>
                            <span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors shrink-0">chevron_right</span>
                          </div>
                        `;

                        card.addEventListener('click', (e) => {
                            e.preventDefault();
                            const path = `faqs-detail.html?id=${art.id}`;
                            if (window.navigateTo) {
                                window.navigateTo(path);
                            } else {
                                window.location.href = path;
                            }
                        });

                        section.appendChild(card);
                    });
                } else {
                    section.innerHTML = '<div class="text-center py-8 text-on-surface-variant">Không có bài viết nào trong danh mục này.</div>';
                }
            } catch (err) {
                console.error("Unhandled error:", err);
                section.innerHTML = '<div class="text-center py-8 text-error">Lỗi hệ thống.</div>';
            }
        });
    </script>


<!-- INTERACTIVE PREVIEW HELPER (DO NOT REMOVE) -->
<script id="interactive-preview-helper">
  (function() {
    let isInsideIframe = false;
    try {
      isInsideIframe = (window.self !== window.top);
    } catch (e) {
      isInsideIframe = true;
    }
    
    window.navigateTo = function(target) {
      if (isInsideIframe) {
        window.parent.postMessage({ type: 'NAVIGATE', to: target }, '*');
      } else {
        window.location.href = target;
      }
    };
    
    /* Run in both iframe and standalone modes */

    // Bind click events on elements based on the current page URL/filename
    document.addEventListener('DOMContentLoaded', () => {
      // Global navigation hooks for any page
      document.querySelectorAll('button, a').forEach(el => {
        const text = (el.textContent || '').trim().toLowerCase();
        if (text.includes('open a support ticket') || 
            text.includes('submit a support ticket') || 
            text.includes('create new ticket') ||
            text.includes('new support case') ||
            text.includes('submit a ticket')) {
          el.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            navigateTo('submit-ticket.html');
          });
        } else if (text.includes('live chat now') || 
                   text.includes('start live chat')) {
          el.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            navigateTo('live-chat.html');
          });
        }
      });
      const path = window.location.pathname;
      const file = path.substring(path.lastIndexOf('/') + 1);

      // login.html
      if (file.includes('login')) {
        const form = document.querySelector('form');
        if (form) {
          form.addEventListener('submit', (e) => {
            e.preventDefault();
            navigateTo('index.html');
          });
        }
        const loginBtn = document.querySelector('button[type="submit"]');
        if (loginBtn) {
          loginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            navigateTo('index.html');
          });
        }
      }

      // index.html
      if (file.includes('index')) {
        document.querySelectorAll('button, a, div.group').forEach(el => {
          const text = el.textContent || '';
          if (text.includes('Start Live Chat') || text.includes('Trò chuyện')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('live-chat.html'); });
          } else if (text.includes('Open a Ticket') || text.includes('Gửi yêu cầu') || text.includes('Submit A Ticket') || text.includes('New Support Case')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('submit-ticket.html'); });
          } else if (text.includes('Technical Issues') || text.includes('Lỗi Kỹ thuật')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('faqs-category.html?category=technical'); });
          } else if (text.includes('Account & Security') || text.includes('Tài khoản & Bảo mật')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('faqs-category.html?category=account'); });
          } else if (text.includes('Billing & Purchases') || text.includes('Thanh toán')) {
            el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); navigateTo('faqs-category.html?category=billing'); });
          }
        });
      }

      // submit-ticket.html
      if (file.includes('submit-ticket')) {
        const form = document.querySelector('form');
        if (form) {
          form.addEventListener('submit', (e) => {
            e.preventDefault();
            navigateTo('ticket-confirmation.html');
          });
        }
        const submitBtn = document.querySelector('button[type="submit"]');
        if (submitBtn) {
          submitBtn.addEventListener('click', (e) => {
            e.preventDefault();
            navigateTo('ticket-confirmation.html');
          });
        }
      }

      // ticket-confirmation.html
      if (file.includes('ticket-confirmation')) {
        document.querySelectorAll('button, a').forEach(el => {
          const text = el.textContent || '';
          if (text.toLowerCase().includes('view') || text.toLowerCase().includes('xem') || text.toLowerCase().includes('ticket')) {
            el.addEventListener('click', (e) => { e.preventDefault(); navigateTo('ticket-detail.html'); });
          } else if (text.toLowerCase().includes('home') || text.toLowerCase().includes('chủ') || text.toLowerCase().includes('quay lại')) {
            el.addEventListener('click', (e) => { e.preventDefault(); navigateTo('index.html'); });
          }
        });
      }

      // tickets.html
      if (file.includes('tickets')) {
        document.querySelectorAll('tr, li, div.cursor-pointer, .border-outline-variant').forEach(el => {
          if (el.textContent.includes('TK-') || el.textContent.includes('Ticket') || el.textContent.includes('Yêu cầu')) {
            el.addEventListener('click', (e) => {
              e.preventDefault();
              navigateTo('ticket-detail.html');
            });
          }
        });
      }

      // ticket-detail.html
      if (file.includes('ticket-detail')) {
        document.querySelectorAll('a, button').forEach(el => {
          const text = el.textContent || '';
          if (text.toLowerCase().includes('back') || text.toLowerCase().includes('quay lại') || text.toLowerCase().includes('danh sách')) {
            el.addEventListener('click', (e) => { e.preventDefault(); navigateTo('tickets.html'); });
          }
        });
      }

      // faqs.html
      if (file.includes('faqs')) {
        // Setup View all 12 categories button interaction
        const viewAllBtn = document.getElementById('view-all-categories-btn');
        const grid = document.getElementById('categories-grid');
        if (viewAllBtn && grid) {
          viewAllBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            // Check if cards already added
            if (document.getElementById('added-card-7')) {
              // Toggle off
              for (let i = 7; i <= 12; i++) {
                const card = document.getElementById('added-card-' + i);
                if (card) card.remove();
              }
              viewAllBtn.innerHTML = 'View all 12 categories <span class="material-symbols-outlined text-sm">arrow_forward</span>';
              return;
            }
            
            // Append 6 new categories
            const extraCategories = [
              { id: 7, title: "Game Downloads & Updates", icon: "download", count: 2, bg: "#E0F7FA", desc: "Troubleshoot patcher loops, file verification, launcher freezes, and download speed optimization." },
              { id: 8, title: "Esports & Tournaments", icon: "emoji_events", count: 2, bg: "#FFF9C4", desc: "Get schedules, team statistics, reward drops, ticket bookings, and tournament rules." },
              { id: 9, title: "Merchandise Support", icon: "shopping_bag", count: 2, bg: "#F5F5F5", desc: "Inquire about clothing apparel sizes, order shipping status, tracking numbers, and damage refunds." },
              { id: 10, title: "Creator Partner Program", icon: "video_camera_front", count: 2, bg: "#E1BEE7", desc: "How to join our creator network, access early updates, custom overlays, and monetization benefits." },
              { id: 11, title: "Localization & Language", icon: "translate", count: 2, bg: "#DCEDC8", desc: "Change in-game audio dubbing, client text translation, regional settings, and server transfers." },
              { id: 12, title: "Feedback & Suggestions", icon: "rate_review", count: 2, bg: "#FFE0B2", desc: "Submit game ideas directly to designers, vote on feature requests, and report in-game bugs." }
            ];
            
            extraCategories.forEach(cat => {
              const card = document.createElement('div');
              card.id = 'added-card-' + cat.id;
              card.className = 'category-card bg-white border border-[#E0E0E0] rounded-[12px] p-8 transition-all duration-300 flex flex-col group cursor-pointer';
              card.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                  <div class="w-14 h-14 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform duration-300" style="background-color: ${cat.bg};">
                    <span class="material-symbols-outlined text-primary text-3xl">${cat.icon}</span>
                  </div>
